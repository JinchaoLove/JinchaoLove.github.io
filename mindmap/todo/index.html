
<!DOCTYPE html>
<html lang="en" class="markmap-dark">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>年度阅读计划</title>
    <style>
      .markmap {
        position: relative;
        width: 100%;
        height: 100vh;
      }
      .markmap-dark {
        background: #27272a;
        color: white;
      }
    </style>
    <script>
      window.markmap = {
        autoLoader: {
          toolbar: true
        }
      };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/markmap-autoloader@0.18"></script>
  </head>
  <body>
    <div class="markmap">
      <script type="text/template">
        ---
        markmap:
          maxWidth: 300
          colorFreezeLevel: 3
          initialExpandLevel: 3
          pan: false
          autoFit: true
          fitRatio: 0.7
        ---

#年度阅读计划


      </script>
    </div>
  </body>
</html>
